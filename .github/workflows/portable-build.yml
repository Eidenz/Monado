name: Portable build

# Produces a relocatable, prebuilt Monado tree that runs on any reasonably
# recent Linux without compiling on the target (for Monadeck's "install built-in
# Monado"). Built on Ubuntu 22.04 (glibc 2.35) so the floor is low; non-system
# libs are bundled by dist/portable/build_portable.sh.
#
#   - manual run            -> uploads the tarball as a workflow artifact
#   - push a tag like v25.1 -> also publishes it as a GitHub Release
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create a Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-22.04 # glibc 2.35 floor -> runs on anything newer
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so `git describe --tags` can name the artifact

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git pkg-config patchelf \
            curl ca-certificates file python3 \
            glslang-tools \
            libvulkan-dev libgl1-mesa-dev mesa-common-dev \
            libeigen3-dev libsdl2-dev libusb-1.0-0-dev libudev-dev zlib1g-dev \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-randr0-dev libxrandr-dev \
            libwayland-dev wayland-protocols libbsd-dev libopenxr-dev libdbus-1-dev

      - name: Build + package portable Monado
        run: bash ./dist/portable/build_portable.sh

      - uses: actions/upload-artifact@v4
        with:
          name: monado-fork-portable
          path: |
            dist-out/*.tar.gz
            dist-out/*.sha256
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist-out/*.tar.gz dist-out/*.sha256 \
            --title "Monado fork ${GITHUB_REF_NAME}" \
            --notes "Portable Monado build (glibc >= 2.35). Extract and point Monadeck at the \`monado\` prefix." \
          || gh release upload "${GITHUB_REF_NAME}" dist-out/*.tar.gz dist-out/*.sha256 --clobber

  # Proves the tarball runs on a DIFFERENT distro: a clean Fedora with only the
  # libraries a VR box always has (GPU/display stack) installed -- NOT monado's
  # build deps. If any dependency shows "not found", the bundle is incomplete.
  verify-portability:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true # diagnostic only — never blocks the build/release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: monado-fork-portable
          path: dist-out
      - name: ldd check inside a stock Fedora container
        run: |
          docker run --rm -v "$PWD/dist-out:/work:ro" fedora:latest bash -c '
            set -e
            # Install only the GPU/display stack a VR box always has (mesa pulls
            # in libdrm, libgbm, wayland-client, libX11/xcb) plus libusb -- NOT
            # monado build deps. Everything else the binary needs is bundled.
            dnf -y install tar gzip vulkan-loader mesa-libGL mesa-vulkan-drivers \
              libX11 libxcb libusb1 || true
            cd /tmp && tar -xzf /work/monado-fork-*.tar.gz
            echo "== ldd monado/bin/monado-service =="
            ldd monado/bin/monado-service || true
            if ldd monado/bin/monado-service | grep -i "not found"; then
              echo "WARNING: unmet library on a clean Fedora target (see above)"; exit 1
            fi
            echo "OK: all dependencies resolve on a clean Fedora"
          '
